<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Memory Game</title>
  <th:block th:replace="~{fragments/styles :: styles}"></th:block>
</head>
<body>
  <div class="stars-layer"></div>

  <div class="page-wrap">
    <div class="auth-page">
      <div class="auth-box">
        <div class="glass-card">

          <div class="logo-wrapper">
            <img th:src="@{/images/logo/MEMORY GAME-Photoroom.png}" alt="Memory Game Logo" class="auth-logo">
          </div>
          
          <h1 class="auth-title">CONNEXION</h1>
          <p class="auth-subtitle">Entrez et retrouvez les paires cachées</p>

          <!-- Succès inscription -->
          <div th:if="${param.registered}" class="form-success">
            Compte créé avec succès ! Connectez-vous.
          </div>

          <!-- Succès déconnexion -->
          <div th:if="${param.logout}" class="form-success"
               style="background:rgba(138,179,212,0.1);border-color:rgba(138,179,212,0.3);color:var(--accent-silver);">
            Vous avez été déconnecté.
          </div>

          <!-- Erreur -->
          <div th:if="${error}" class="form-error" th:text="${error}"></div>

          <!-- Formulaire de connexion -->
          <form method="post" th:action="@{/login}" autocomplete="on">

            <input type="hidden" name="csrf" th:value="${csrf}"/>

            <div class="form-group">
              <label class="form-label" for="username">Nom d'utilisateur ou Email</label>
              <input id="username" name="username" type="text"
                     class="form-input"
                     placeholder="pseudo ou adresse email"
                     required autocomplete="username"
                     minlength="3" maxlength="100"/>
            </div>

            <div class="form-group password-field">
              <label class="form-label" for="password">Mot de passe</label>

              <div class="password-wrapper">
                <input id="password" name="password" type="password"
                       class="form-input"
                       placeholder="••••••••"
                       required autocomplete="current-password"
                       minlength="6"/>
              
                <span class="toggle-eye" onclick="togglePassword('password', this)">
                
                  <!-- OEIL OUVERT -->
                  <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                
                  <!-- OEIL FERMÉ -->
                  <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2"
                       style="display:none;">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"/>
                    <path d="M1 1l22 22"/>
                    <path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/>
                    <path d="M14.47 14.47A3 3 0 0 0 9.53 9.53"/>
                  </svg>
                
                </span>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg"
                    style="width:100%;margin-top:0.75rem;">
              Entrer ✦
            </button>
          </form>

          <hr class="auth-divider"/>

          <div class="auth-footer">
            Pas encore de compte ?
            <a th:href="@{/register}">Créer un compte</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
