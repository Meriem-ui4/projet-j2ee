<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription — Memory Game</title>
  <th:block th:replace="~{fragments/styles :: styles}"></th:block>
</head>
<body>
  <div class="stars-layer"></div>

  <div class="page-wrap">
    <div class="auth-page">
      <div class="auth-box">
        <div class="glass-card">

          <span class="auth-logo">🌟</span>

          <h1 class="auth-title">INSCRIPTION</h1>
          <p class="auth-subtitle">Rejoignez l'univers des maîtres mémoire</p>

          <!-- Erreur -->
          <div th:if="${error}" class="form-error" th:text="${error}"></div>

          <!-- Formulaire d'inscription -->
          <form method="post" th:action="@{/register}" autocomplete="off">

            <input type="hidden" name="csrf" th:value="${csrf}"/>

            <div class="form-group">
              <label class="form-label" for="username">Nom d'utilisateur</label>
              <input id="username" name="username" type="text"
                     class="form-input"
                     placeholder="ex : StarPlayer42"
                     required minlength="3" maxlength="20"
                     pattern="[a-zA-Z0-9_]+"
                     title="Lettres, chiffres et _ uniquement"/>
              <span class="form-hint">3–20 caractères, lettres/chiffres/_ uniquement</span>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Adresse Email</label>
              <input id="email" name="email" type="email"
                     class="form-input"
                     placeholder="exemple@mail.com"
                     required maxlength="100"
                     autocomplete="email"/>
              <span class="form-hint">Utilisé pour la connexion (en plus du pseudo)</span>
            </div>

            <div class="form-group password-field">
              <label class="form-label" for="password">Mot de passe</label>

              <div class="password-wrapper">
                <input id="password" name="password" type="password"
                       class="form-input"
                       placeholder="minimum 6 caractères"
                       required minlength="6"/>
              
                <span class="toggle-eye" onclick="togglePassword('password', this)">
                
                  <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                
                  <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2"
                       style="display:none;">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"/>
                    <path d="M1 1l22 22"/>
                    <path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/>
                    <path d="M14.47 14.47A3 3 0 0 0 9.53 9.53"/>
                  </svg>
                
                </span>
              </div>
            
              <span class="form-hint">Minimum 6 caractères</span>
            </div>

            <div class="form-group password-field">
              <label class="form-label" for="confirm">Confirmer le mot de passe</label>
                        
              <div class="password-wrapper">
                <input id="confirm" name="confirm" type="password"
                       class="form-input"
                       placeholder="••••••••"
                       required minlength="6"/>
              
                <span class="toggle-eye" onclick="togglePassword('confirm', this)">
                
                  <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                
                  <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20"
                       fill="none" stroke="currentColor" stroke-width="2"
                       style="display:none;">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"/>
                    <path d="M1 1l22 22"/>
                    <path d="M9.53 9.53a3 3 0 0 0 4.24 4.24"/>
                    <path d="M14.47 14.47A3 3 0 0 0 9.53 9.53"/>
                  </svg>
                
                </span>
              </div>
            </div>

            <button type="submit" id="submit-btn"
                    class="btn btn-primary btn-lg"
                    style="width:100%;margin-top:0.75rem;">
              Créer mon compte ✦
            </button>
          </form>

          <hr class="auth-divider"/>

          <div class="auth-footer">
            Déjà un compte ?
            <a th:href="@{/login}">Se connecter</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      const pwd     = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (pwd !== confirm) {
        e.preventDefault();
        const existing = document.querySelector('.form-error');
        if (existing) existing.remove();
        const err = document.createElement('div');
        err.className = 'form-error';
        err.textContent = 'Les mots de passe ne correspondent pas.';
        document.querySelector('form').prepend(err);
      }
    });
  </script>
</body>
</html>
